apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  sources:
    - repoURL: oci://public.ecr.aws/karpenter
      chart: karpenter
      targetRevision: "1.0.2"
      helm:
        valueFiles:
          - $values/platform/karpenter/values/prod.yaml
    - repoURL: https://github.com/Profect-4th-IRUM/come2us-gitops
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
