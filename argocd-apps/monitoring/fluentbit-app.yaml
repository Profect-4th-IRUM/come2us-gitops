apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluent-bit
  namespace: argo
spec:
  project: default

  source:
    repoURL: https://fluent.github.io/helm-charts
    chart: fluent-bit
    targetRevision: 0.46.7
    helm:
      releaseName: fluent-bit
      values: |
        serviceAccount:
          create: true
          name: fluent-bit

        rbac:
          create: true

        kind: DaemonSet

        tolerations:
          - key: "node_type"
            operator: "Equal"
            value: "infra"
            effect: "NoSchedule"

        volumes:
          machineID:
            enabled: false

        config:

          service: |
            [SERVICE]
                Flush        1
                Daemon       Off
                Log_Level    info
                Parsers_File parsers.conf
                HTTP_Server  On
                HTTP_Listen  0.0.0.0
                HTTP_Port    2020

          inputs: |
            [INPUT]
                Name              tail
                Path              /var/log/containers/*.log
                Tag               kube.*
                Parser            cri
                Mem_Buf_Limit     10MB
                Skip_Long_Lines   On
                Refresh_Interval  5

          filters: |
            [FILTER]
                Name                  kubernetes
                Match                 kube.*
                Merge_Log             On
                Keep_Log              On

          outputs: |
            [OUTPUT]
                Name          loki
                Match         *
                Host          loki.monitoring.svc.cluster.local
                Port          3100
                Labels        job=fluent-bit,namespace=logging
                Line_Format   json
                auto_kubernetes_labels  On

          parsers: |
            [PARSER]
                Name   cri
                Format regex
                Regex  ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<log>.*)$


  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
