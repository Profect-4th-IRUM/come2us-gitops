apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: product-service
  namespace: argo
spec:
  project: default

  source:
    repoURL: 'https://github.com/Profect-4th-IRUM/come2us-gitops.git'
    path: charts/product-service
    targetRevision: develop
    helm:
      valueFiles:
        - values-prod.yaml

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: come2us

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /status
        - /metadata/annotations
        - /spec/data
