project: default
source:
  repoURL: 'https://github.com/Profect-4th-IRUM/come2us-gitops.git'
  path: k8s-manifest
  targetRevision: main
destination:
  server: 'https://kubernetes.default.svc'
  namespace: external-secrets
syncPolicy:
  automated:
    prune: true
    selfHeal: true
  syncOptions:
    - ServerSideApply=true

---

project: default
source:
  repoURL: 'https://charts.external-secrets.io'
  targetRevision: 0.9.20
  helm:
    values: |-
      installCRDs: true
      controller:
        create: true
      webhook:
        create: true
      certController:
        create: true

      serviceAccount:
        create: true
        name: external-secrets
        annotations: 
          eks.amazonaws.com/role-arn: "arn:aws:iam::997784788329:role/external-secrets-irsa"
  chart: external-secrets
destination:
  server: 'https://kubernetes.default.svc'
  namespace: external-secrets
syncPolicy:
  automated:
    prune: true
    selfHeal: true
