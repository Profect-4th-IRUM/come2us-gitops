name: Deploy Change
description: 애플리케이션 배포 설정 변경 요청
title: "[Deploy] "
labels:
  - type:deploy
body:
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: 변경이 적용될 환경을 선택해주세요.
      options:
        - dev
        - stage
        - prod
    validations:
      required: true

  - type: dropdown
    id: service
    attributes:
      label: Service
      description: 대상 서비스를 선택해주세요.
      options:
        - member
        - order
        - payment
        - product
        - platform
    validations:
      required: true

  - type: dropdown
    id: change_type
    attributes:
      label: Change Type
      description: 어떤 종류의 배포 변경인지 선택해주세요.
      options:
        - image tag update
        - replica count change
        - resource requests/limits change
        - env/config change
        - hpa change
        - ingress/gateway related
        - rollback
        - other
    validations:
      required: true

  - type: input
    id: image_tag
    attributes:
      label: Target Image Tag / Revision
      description: 대상 image tag 또는 revision이 있다면 적어주세요.
      placeholder: ex) v1.2.3 / sha-abc123

  - type: textarea
    id: current_state
    attributes:
      label: Current State
      description: 현재 상태를 적어주세요.
      placeholder: |
        ex)
        - prod/member currently runs image tag v1.2.1
        - replicaCount = 2
        - HPA min/max = 2/5

  - type: textarea
    id: requested_change
    attributes:
      label: Requested Change
      description: 어떤 변경이 필요한지 구체적으로 적어주세요.
      placeholder: |
        ex)
        - member image tag를 v1.2.3으로 변경
        - replicaCount를 2 -> 3으로 변경
        - requests.cpu를 200m -> 300m으로 상향
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: 왜 이 변경이 필요한가요?
      placeholder: |
        ex)
        - 신규 기능 배포
        - 장애 수정
        - OOM 발생 대응
        - CPU throttling 완화
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Expected Impact
      description: 예상 영향 범위와 다운타임 여부를 적어주세요.
      placeholder: |
        ex)
        - RollingUpdate 기준 무중단 예상
        - 일시적 응답 지연 가능성 있음
        - 특정 API 트래픽 증가 대응 목적
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: Validation Plan
      description: 변경 후 어떤 기준으로 정상 여부를 확인할지 적어주세요.
      placeholder: |
        ex)
        - ArgoCD Synced / Healthy 확인
        - Pod Ready 확인
        - ALB/Ingress health check 확인
        - Grafana error rate / latency 확인
        - smoke test 수행
    validations:
      required: true

  - type: textarea
    id: rollback
    attributes:
      label: Rollback Plan
      description: 실패 시 어떻게 되돌릴지 적어주세요.
      placeholder: |
        ex)
        - 이전 image tag로 되돌림
        - replicaCount 원복
        - 이전 values commit으로 revert
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-check
      options:
        - label: 대상 환경을 확인했습니다.
          required: true
        - label: 변경 영향 범위를 검토했습니다.
          required: true
        - label: 롤백 방안을 준비했습니다.
          required: true