name: Docs / Repository Improvement
description: 문서 또는 레포 구조 개선 요청
title: "[Docs] "
labels:
  - type:docs
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: 어떤 영역의 문서/구조를 개선하려는지 선택해주세요.
      options:
        - README
        - runbook
        - onboarding
        - repository structure
        - naming convention
        - contribution guide
        - architecture docs
        - other
    validations:
      required: true

  - type: textarea
    id: current_problem
    attributes:
      label: Current Problem
      description: 현재 어떤 문제가 있는지 적어주세요.
      placeholder: |
        ex)
        - 디렉토리 구조 설명이 부족함
        - 신규 팀원이 values 위치를 찾기 어려움
        - 운영 절차 문서가 없어 장애 대응이 어려움
    validations:
      required: true

  - type: textarea
    id: requested_change
    attributes:
      label: Requested Change
      description: 어떤 개선이 필요한지 적어주세요.
      placeholder: |
        ex)
        - README에 디렉토리 구조 추가
        - platform/app 구분 기준 문서화
        - ArgoCD 배포 흐름 runbook 추가
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: 왜 필요한지 적어주세요.
    validations:
      required: true

  - type: textarea
    id: done_criteria
    attributes:
      label: Done Criteria
      description: 완료 기준을 적어주세요.
      placeholder: |
        ex)
        - 신규 팀원이 README만 보고 구조 이해 가능
        - 운영 절차가 단계별로 문서화됨
        - 디렉토리별 책임 범위가 명확해짐
    validations:
      required: true