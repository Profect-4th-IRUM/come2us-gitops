apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  role: come2us-karpenter-node-role
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: come2us-eks
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: come2us-eks
  tags:
    Name: come2us-karpenter-node
    Project: come2us
