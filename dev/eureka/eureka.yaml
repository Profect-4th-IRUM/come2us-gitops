apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eureka
  template:
    metadata:
      labels:
        app: eureka
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: eureka
          image: 997784788329.dkr.ecr.ap-northeast-2.amazonaws.com/come2us-eureka:latest
          ports:
            - containerPort: 8761
          env:
            - name: PROFILE_ACTIVE
              value: "prod"  # var.spring_profile_active

            - name: CONFIG_SERVER_URL
              value: "http://config-server:8888"

            - name: EUREKA_HOST
              value: "eureka"

            - name: EUREKA_PORT
              value: "8761"
---
apiVersion: v1
kind: Service
metadata:
  name: eureka
spec:
  type: NodePort
  selector:
    app: eureka
  ports:
    - port: 8761
      targetPort: 8761
