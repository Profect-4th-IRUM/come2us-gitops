apiVersion: apps/v1
kind: Deployment
metadata:
  name: jwks-server
  namespace: jwks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jwks-server
  template:
    metadata:
      labels:
        app: jwks-server
    spec:
      containers:
        - name: nginx
          image: nginx:stable
          ports:
            - containerPort: 80
          volumeMounts:
            - name: jwks-volume
              mountPath: /usr/share/nginx/html
      volumes:
        - name: jwks-volume
          configMap:
            name: jwks-config
