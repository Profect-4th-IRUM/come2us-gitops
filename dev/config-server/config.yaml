apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: come2us
spec:
  replicas: 2
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: config-server
          image: 997784788329.dkr.ecr.ap-northeast-2.amazonaws.com/come2us-config:latest
          ports:
            - containerPort: 8888
          env:
            - name: GIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: config-secret
                  key: git-username

            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: config-secret
                  key: git-token

            - name: JWT_ACCESS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: config-secret
                  key: jwt-access-secret

---
apiVersion: v1
kind: Service
metadata:
  name: config-server
spec:
  type: ClusterIP
  selector:
    app: config-server
  ports:
    - port: 8888
      targetPort: 8888
