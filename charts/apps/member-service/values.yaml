namespace: "come2us"

prefix: "come2us"

secretStore:
  name: aws-ssm
  kind: ClusterSecretStore

replicaCount: 2

image:
  repository: "997784788329.dkr.ecr.ap-northeast-2.amazonaws.com/come2us-member"
  tag: "latest"
  pullSecret: "ecr-secret"

container:
  port: 8081

service:
  port: 8081
  type: ClusterIP

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1024Mi"

config:
  PROFILE_ACTIVE: "prod"
  MEMBER_HOSTNAME: "member-service"
  MEMBER_PORT: "8081"

  WRITE_POSTGRESQL_HOST: "postgres.db.svc.cluster.local"
  WRITE_POSTGRESQL_PORT: "5432"
  WRITE_DB_NAME: "come2us"
  WRITE_POSTGRESQL_USERNAME: "come2us"

  READ_POSTGRESQL_HOST: "postgres.db.svc.cluster.local"
  READ_POSTGRESQL_PORT: "5432"
  READ_DB_NAME: "come2us"
  READ_POSTGRESQL_USERNAME: "come2us"

  DATA_REDIS_HOST: "session-redis.db.svc.cluster.local"
  DATA_REDIS_PORT: "6379"

  CACHE_REDIS_HOST: "cache-redis.db.svc.cluster.local"
  CACHE_REDIS_PORT: "6379"

  JWT_ACCESS_TOKEN_EXPIRATION_TIME: "3600"
  JWT_REFRESH_TOKEN_EXPIRATION_TIME: "604800"
  JWT_ISSUER: "irum"

secrets:
  jwtAccessPrivateKey: ""
  jwtAccessPublicKey: ""
  jwtRefreshSecret: ""
  writeDbPassword: ""
  readDbPassword: ""
  redisPassword: ""

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60
