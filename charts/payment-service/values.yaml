namespace: "come2us"

prefix: "come2us"

secretStore:
  name: aws-ssm
  kind: ClusterSecretStore

replicaCount: 1

image:
  repository: "997784788329.dkr.ecr.ap-northeast-2.amazonaws.com/come2us-payment"
  tag: "latest"
  pullSecret: "ecr-secret"

container:
  port: 8084

service:
  port: 8084
  type: ClusterIP

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1024Mi"

config:
  PROFILE_ACTIVE: "prod"
  PAYMENT_HOSTNAME: "payment-service"
  PAYMENT_PORT: "8084"

  WRITE_POSTGRESQL_HOST: "postgres.db.svc.cluster.local"
  WRITE_POSTGRESQL_PORT: "5432"
  WRITE_DB_NAME: "come2us"
  WRITE_POSTGRESQL_USERNAME: "come2us"

  READ_POSTGRESQL_HOST: "postgres.db.svc.cluster.local"
  READ_POSTGRESQL_PORT: "5432"
  READ_DB_NAME: "come2us"
  READ_POSTGRESQL_USERNAME: "come2us"

  CACHE_REDIS_HOST: "cache-redis.db.svc.cluster.local"
  CACHE_REDIS_PORT: "6379"

  KAFKA_BOOTSTRAP_SERVERS: ""
  NUM_OF_PARTITION: 3
  NUM_OF_REPLICA: 3
  PAYMENT_PAID_TOPIC_NAME: "payment-paid"
  PAYMENT_FAILED_TOPIC_NAME: "payment-failed"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60
