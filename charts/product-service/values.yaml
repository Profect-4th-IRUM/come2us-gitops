namespace: "come2us"

monitor:
  namespace: "monitoring"
  labels:
    release: kube-prometheus

prefix: "come2us"

secretStore:
  name: aws-ssm
  kind: ClusterSecretStore

replicaCount: 1

image:
  repository: "997784788329.dkr.ecr.ap-northeast-2.amazonaws.com/come2us-product"
  tag: "latest"
  pullSecret: "ecr-secret"

container:
  port: 8082

service:
  port: 8082
  type: ClusterIP
  portName: http-metrics

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1024Mi"

config:
  PROFILE_ACTIVE: "prod"
  PRODUCT_HOSTNAME: "product-service"
  PRODUCT_PORT: "8082"

  WRITE_POSTGRESQL_HOST: "postgres.db.svc.cluster.local"
  WRITE_POSTGRESQL_PORT: "5432"
  WRITE_DB_NAME: "come2us"
  WRITE_POSTGRESQL_USERNAME: "come2us"

  READ_POSTGRESQL_HOST: "postgres.db.svc.cluster.local"
  READ_POSTGRESQL_PORT: "5432"
  READ_DB_NAME: "come2us"
  READ_POSTGRESQL_USERNAME: "come2us"

  DATA_REDIS_HOST: "session-redis.db.svc.cluster.local"
  DATA_REDIS_PORT: "6379"

  CACHE_REDIS_HOST: "cache-redis.db.svc.cluster.local"
  CACHE_REDIS_PORT: "6379"

  KAFKA_BOOTSTRAP_SERVERS: "kafka.kafka.svc.cluster.local:9092"
  PRODUCT_GROUP_ID: "product-service-group"
  NUM_OF_PARTITION: 3
  NUM_OF_REPLICA: 3
  ORDER_FAILED_TOPIC_NAME: "order-failed"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60
