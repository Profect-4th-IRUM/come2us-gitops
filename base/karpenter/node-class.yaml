apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2023

  bootstrap:
    containerRuntime: containerd
    kubeletConfig:
      maxPods: 110

  role: arn:aws:iam::997784788329:role/come2us-eks-karpenter-node
  instanceProfile: come2us-eks-karpenter-node

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: come2us-eks
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: come2us-eks

  tags:
    karpenter.sh/discovery: come2us-eks
