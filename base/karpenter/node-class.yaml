apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2

  role: arn:aws:iam::997784788329:role/come2us-eks-karpenter-node      # module.iam.karpenter_node_role_arn
  instanceProfile: come2us-eks-karpenter-node                           # module.iam.karpenter_node_instance_profile_name

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: come2us-eks
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: come2us-eks
  tags:
    karpenter.sh/discovery: come2us-eks
