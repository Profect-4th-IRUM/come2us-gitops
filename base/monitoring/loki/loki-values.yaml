deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  server:
    http_listen_port: 3100
    grpc_listen_port: 9095

  schemaConfig:
    configs:
      - from: "2020-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h

  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin
    s3:
      endpoint: http://minio.minio.svc.cluster.local:9000
      region: us-east-1
      accessKeyId: ${LOKI_S3_ACCESS_KEY_ID}        
      secretAccessKey: ${LOKI_S3_SECRET_ACCESS_KEY}
      s3ForcePathStyle: true
      insecure: true

  memberlist:
    join_members: []

  query_range:
    results_cache:
      cache:
        enable_fifocache: true
        memcached_client:
          host: ""

  frontend:
    log_queries_longer_than: 5s

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

gateway:
  enabled: false
