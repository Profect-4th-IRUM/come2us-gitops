# fluentbit-values.yaml

image:
  registry: docker.io
  repository: fluent/fluent-bit
  tag: 3.1.10
  pullPolicy: IfNotPresent

# DaemonSet으로 각 노드의 /var/log/containers 읽기
kind: DaemonSet

serviceAccount:
  create: true
  name: fluent-bit

rbac:
  create: true

# 노드의 로그 디렉토리 마운트
daemonSetVolumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers

daemonSetVolumeMounts:
  - name: varlog
    mountPath: /var/log
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true

# 메트릭용 HTTP 포트
logLevel: info
flush: 1
metricsPort: 2020

# 필요하면 환경변수 추가 (선택)
env:
  - name: TZ
    value: Asia/Seoul

config:
  service: |
    [SERVICE]
        Flush        1
        Daemon       Off
        Log_Level    info
        Parsers_File /fluent-bit/etc/parsers.conf
        HTTP_Server  On
        HTTP_Listen  0.0.0.0
        HTTP_Port    2020

  inputs: |
    # K8s 컨테이너 로그 수집
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Tag               kube.*
        multiline.parser  docker, cri
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  5

  filters: |
    # K8s 메타데이터 붙이기 (namespace, pod_name 등)
    [FILTER]
        Name                  kubernetes
        Match                 kube.*
        Merge_Log             On
        Keep_Log              On
        Kube_Tag_Prefix       kube.var.log.containers.
        Kube_URL              https://kubernetes.default.svc:443
        Merge_Log_Key         log

  outputs: |
    # 메인: 로컬 Kafka(app-logs)으로 전송
    [OUTPUT]
        Name                        kafka
        Match                       kube.*
        Brokers                     kafka-kafka.kafka.svc.cluster.local:9092
        Topics                      app-logs
        Format                      json
        Retry_Limit                 False

        # Kafka 메시지에 타임스탬프 포함
        Timestamp_Key               @timestamp
        Timestamp_Format            iso8601

        # 로컬 Kafka는 PLAINTEXT → SSL 설정 필요 없음
        # rdkafka.security.protocol   ssl

    # 디버깅용: 필요하면 stdout 출력도 가능 (주석 해제해서 사용)
    # [OUTPUT]
    #     Name          stdout
    #     Match         kube.*

